<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoA 智能助理</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, "Noto Sans HK", "PingFang HK", sans-serif;
      font-size: 20px;
      color: #16324f;
      background: #eef6f7;
    }

    * { box-sizing: border-box; }

    body {
      min-width: 280px;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(180deg, #e8f4f5 0%, #f8fbfb 100%);
    }

    .top-bar {
      display: flex;
      min-height: 68px;
      padding: .55rem max(1rem, calc((100% - 760px) / 2));
      align-items: center;
      justify-content: flex-end;
      border-bottom: 1px solid #b7cfd2;
      background: #fff;
      box-shadow: 0 2px 8px rgba(34, 77, 83, .08);
    }

    .menu-button {
      display: grid;
      width: 52px;
      height: 52px;
      padding: 12px 9px;
      gap: 5px;
      border: 2px solid transparent;
      border-radius: 9px;
      background: transparent;
      cursor: pointer;
    }

    .menu-button span {
      display: block;
      height: 4px;
      border-radius: 3px;
      background: #103b4a;
    }

    .menu-button:hover { background: #e6f3f4; }

    .menu-panel {
      position: fixed;
      z-index: 20;
      top: 68px;
      right: 0;
      width: min(86vw, 360px);
      height: calc(100vh - 68px);
      padding: 1rem;
      border-left: 1px solid #b7cfd2;
      background: #fff;
      box-shadow: -8px 8px 20px rgba(11, 67, 77, .18);
    }

    .menu-panel[hidden], .page[hidden], .account-form[hidden] { display: none; }

    .menu-list {
      display: grid;
      gap: .7rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .menu-link {
      display: block;
      width: 100%;
      min-height: 58px;
      padding: .75rem 1rem;
      border: 2px solid #b7cfd2;
      border-radius: 10px;
      color: #103b4a;
      background: #fff;
      font: inherit;
      font-weight: 750;
      text-align: left;
      text-decoration: none;
      cursor: pointer;
    }

    .menu-link:hover { background: #e6f3f4; }
    .privacy-menu-item { margin-top: 1rem; }

    .menu-overlay {
      position: fixed;
      z-index: 10;
      inset: 68px 0 0;
      border: 0;
      background: rgba(10, 35, 42, .45);
    }

    .menu-overlay[hidden] { display: none; }

    main {
      width: min(100% - 2rem, 760px);
      margin: 0 auto;
      padding: 2rem 0 3rem;
      text-align: center;
    }

    h1 {
      margin: 0 0 .75rem;
      font-size: clamp(2rem, 8vw, 3rem);
      line-height: 1.15;
      color: #103b4a;
    }

    .intro {
      max-width: 30rem;
      margin: 0 auto 1.5rem;
      font-size: clamp(1.15rem, 4vw, 1.4rem);
      line-height: 1.6;
    }

    .microphone-button {
      display: flex;
      width: 176px;
      height: 176px;
      margin: 0 auto 1.25rem;
      padding: 1rem;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      border: 5px solid #fff;
      border-radius: 50%;
      color: #fff;
      background: #076b75;
      box-shadow: 0 8px 22px rgba(11, 67, 77, .25);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      touch-action: manipulation;
    }

    .microphone-button:hover { background: #055862; }
    .microphone-button:disabled { cursor: wait; opacity: 1; }
    .microphone-button.listening {
      background: #b42318;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .microphone-button svg {
      width: 58px;
      height: 58px;
      fill: currentColor;
    }

    @keyframes pulse {
      50% { box-shadow: 0 0 0 15px rgba(180, 35, 24, .18); }
    }

    @media (prefers-reduced-motion: reduce) {
      .microphone-button.listening { animation: none; }
    }

    button:focus-visible,
    textarea:focus-visible {
      outline: 4px solid #f2a900;
      outline-offset: 4px;
    }

    .status {
      min-height: 3.4rem;
      margin: 0 auto 1.25rem;
      font-weight: 700;
      line-height: 1.5;
      color: #16324f;
    }

    .status.error { color: #9b1c1c; }

    .text-entry {
      padding: 1.25rem;
      border: 1px solid #b7cfd2;
      border-radius: 18px;
      text-align: left;
      background: #fff;
      box-shadow: 0 5px 16px rgba(34, 77, 83, .1);
    }

    .subpage {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.4rem;
      border: 1px solid #b7cfd2;
      border-radius: 18px;
      text-align: left;
      background: #fff;
      box-shadow: 0 5px 16px rgba(34, 77, 83, .1);
    }

    .subpage h1 { text-align: center; }
    .subpage-intro { text-align: center; line-height: 1.6; }

    .form-field { margin-bottom: 1rem; }

    input, select {
      width: 100%;
      min-height: 56px;
      padding: .65rem .8rem;
      border: 2px solid #789da2;
      border-radius: 10px;
      color: #102f3d;
      background: #fff;
      font: inherit;
    }

    select { appearance: auto; }

    input:focus-visible, select:focus-visible, a:focus-visible {
      outline: 4px solid #f2a900;
      outline-offset: 4px;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .65rem;
      margin: 1.2rem 0;
    }

    .form-message {
      min-height: 1.7rem;
      margin: .8rem 0 0;
      font-weight: 700;
      color: #075b64;
    }

    .contact-list, .reminder-list {
      display: grid;
      gap: .7rem;
      margin: 1.3rem 0 0;
      padding: 0;
      list-style: none;
    }

    .contact-item, .reminder-item {
      display: flex;
      padding: .8rem;
      align-items: center;
      justify-content: space-between;
      gap: .7rem;
      border: 1px solid #b7cfd2;
      border-radius: 10px;
      overflow-wrap: anywhere;
    }

    .small-button { min-height: 50px; flex: 0 0 auto; }

    label {
      display: block;
      margin-bottom: .6rem;
      font-size: 1.2rem;
      font-weight: 750;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 190px;
      resize: vertical;
      padding: .9rem;
      border: 2px solid #789da2;
      border-radius: 10px;
      color: #102f3d;
      background: #fff;
      font: inherit;
      font-size: 1.1rem;
      line-height: 1.55;
    }

    textarea::placeholder { color: #61767b; opacity: 1; }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: .75rem;
      margin-top: 1rem;
    }

    .action-button {
      min-height: 58px;
      padding: .7rem 1rem;
      border: 2px solid #076b75;
      border-radius: 10px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }

    .send-button { color: #fff; background: #076b75; }
    .send-button:hover { background: #055862; }
    .secondary-button { color: #075b64; background: #fff; }
    .secondary-button:hover { background: #e6f3f4; }
    .danger-button { color: #b42318; border-color: #b42318; background: #fff; }
    .danger-button:hover { background: #fef0ef; }

    .privacy-note {
      margin: 1.25rem 0 0;
      font-size: .9rem;
      line-height: 1.55;
      color: #425f66;
    }

    .conversation {
      margin-top: 1.5rem;
      padding: 1.25rem;
      border: 1px solid #b7cfd2;
      border-radius: 18px;
      text-align: left;
      background: #fff;
      box-shadow: 0 5px 16px rgba(34, 77, 83, .1);
    }

    .conversation h2 { margin: 0 0 1rem; font-size: 1.45rem; }

    .conversation-list {
      display: grid;
      gap: .9rem;
      margin-bottom: 1rem;
    }

    .conversation-empty { margin: 0; color: #61767b; }

    .message-bubble {
      margin: 0;
      padding: .85rem 1rem;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .message-bubble.user { background: #e6f3f4; }
    .message-bubble.assistant { background: #f4f1e8; }
    .message-label { display: block; margin-bottom: .25rem; font-weight: 800; }

    .audio-preference {
      display: flex;
      margin: .8rem 0;
      align-items: center;
      gap: .7rem;
      font-size: 1rem;
      font-weight: 650;
    }

    .audio-preference input { width: 26px; min-height: 26px; flex: 0 0 auto; }

    .audio-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: .7rem;
    }

    .audio-status { min-height: 1.7rem; margin: .8rem 0 0; font-weight: 700; }

    @media (min-width: 560px) {
      main { padding-top: 3rem; }
      .actions { grid-template-columns: 1.4fr 1fr 1fr; }
      .microphone-button { width: 190px; height: 190px; }
      .audio-actions { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <button id="menuButton" class="menu-button" type="button" aria-label="開啟選單" aria-controls="menuPanel" aria-expanded="false">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>
  </header>

  <button id="menuOverlay" class="menu-overlay" type="button" aria-label="關閉選單" hidden></button>
  <nav id="menuPanel" class="menu-panel" aria-label="主選單" hidden>
    <ul class="menu-list">
      <li><button class="menu-link page-link" type="button" data-page="accountPage">賬戶</button></li>
      <li><button class="menu-link page-link" type="button" data-page="remindersPage">提醒設定</button></li>
      <li><button class="menu-link page-link" type="button" data-page="contactsPage">聯繫人</button></li>
      <li><button class="menu-link page-link" type="button" data-page="caregiverPage">照顧者模式</button></li>
      <li class="privacy-menu-item"><a class="menu-link" href="privacy.html">私隱及同意書</a></li>
    </ul>
  </nav>

  <main>
    <section id="homePage" class="page">
      <h1>CoA 智能助理</h1>
      <p class="intro">按下咪高峰，然後慢慢說出你想問的事情。</p>

      <button id="microphoneButton" class="microphone-button" type="button" aria-label="按下說話">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Zm-1 3.93V21H8a1 1 0 1 0 0 2h8a1 1 0 1 0 0-2h-3v-3.07A7 7 0 0 0 19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.93Z"/>
        </svg>
        <span id="microphoneLabel">按下說話</span>
      </button>

      <p id="status" class="status" aria-live="polite">準備好後，請按下咪高峰。</p>

      <section class="text-entry" aria-labelledby="transcriptLabel">
        <label id="transcriptLabel" for="transcript">你說的內容</label>
        <textarea id="transcript" placeholder="辨識出的文字會顯示在這裡"></textarea>

        <div class="actions">
          <button id="sendButton" class="action-button send-button" type="button">傳送</button>
          <button id="retryButton" class="action-button secondary-button" type="button">重新說話</button>
          <button id="clearButton" class="action-button secondary-button" type="button">清除</button>
        </div>
      </section>

      <p class="privacy-note">語音辨識可能由瀏覽器或裝置提供的服務處理。請避免說出密碼、身份證號碼或其他敏感資料。</p>

      <section class="conversation" aria-labelledby="conversationTitle">
        <h2 id="conversationTitle">對話</h2>
        <div id="conversationList" class="conversation-list" aria-live="polite">
          <p id="conversationEmpty" class="conversation-empty">回覆會顯示在這裡。</p>
        </div>

        <label class="audio-preference" for="autoPlayReply">
          <input id="autoPlayReply" type="checkbox" checked>
          <span>收到回覆後自動播放</span>
        </label>

        <div class="audio-actions">
          <button id="playReplyButton" class="action-button secondary-button" type="button" disabled>播放回覆</button>
          <button id="stopAudioButton" class="action-button secondary-button" type="button" disabled>停止播放</button>
          <button id="replayReplyButton" class="action-button secondary-button" type="button" disabled>重新播放</button>
        </div>
        <p id="audioStatus" class="audio-status" aria-live="polite"></p>
      </section>
    </section>

    <section id="accountPage" class="page subpage" hidden>
      <h1>賬戶</h1>
      <p class="subpage-intro">登入或註冊以使用提醒功能。</p>
      <div class="mode-buttons">
        <button id="showLoginButton" class="action-button send-button" type="button">登入</button>
        <button id="showRegisterButton" class="action-button secondary-button" type="button">註冊</button>
      </div>

      <form id="loginForm" class="account-form">
        <div class="form-field">
          <label for="loginName">用戶名稱</label>
          <input id="loginName" name="loginName" autocomplete="username" required>
        </div>
        <div class="form-field">
          <label for="loginPassword">密碼</label>
          <input id="loginPassword" name="loginPassword" type="password" autocomplete="current-password" required>
        </div>
        <button class="action-button send-button" type="submit">登入</button>
      </form>

      <form id="registerForm" class="account-form" hidden>
        <div class="form-field">
          <label for="registerName">用戶名稱</label>
          <input id="registerName" name="registerName" autocomplete="username" required>
        </div>
        <div class="form-field">
          <label for="registerPassword">密碼</label>
          <input id="registerPassword" name="registerPassword" type="password" autocomplete="new-password" required>
        </div>
        <div class="form-field">
          <label for="registerDisplayName">顯示名稱</label>
          <input id="registerDisplayName" name="registerDisplayName" placeholder="例如：陳照顧者" required>
        </div>
        <button class="action-button send-button" type="submit">註冊</button>
      </form>
      <p id="accountMessage" class="form-message" aria-live="polite"></p>
      <button class="action-button secondary-button home-link" type="button">返回主頁</button>
    </section>

    <section id="remindersPage" class="page subpage" hidden>
      <h1>提醒設定</h1>
      <p class="subpage-intro">設定你嘅食藥時間，小安會準時提你。</p>

      <!-- 新增提醒表單 -->
      <div class="reminder-form">
        <div class="form-field">
          <label for="medName">💊 藥物名稱</label>
          <input type="text" id="medName" placeholder="例如：Donepezil" class="input-large">
        </div>
        <div class="form-field">
          <label for="medTime">🕐 時間</label>
          <input type="time" id="medTime" value="08:00" class="input-large">
        </div>
        <div class="form-field">
          <label for="medRepeat">📅 重複</label>
          <select id="medRepeat" class="input-large">
            <option value="mon,tue,wed,thu,fri,sat,sun">每日</option>
            <option value="mon,tue,wed,thu,fri">平日 (一至五)</option>
            <option value="sat,sun">週末</option>
            <option value="mon,wed,fri">一三五</option>
            <option value="tue,thu">二四</option>
          </select>
        </div>
        <button id="addReminderBtn" class="action-button send-button" type="button">➕ 新增提醒</button>
      </div>

      <!-- 提醒列表 -->
      <h3 style="margin: 1.5rem 0 .5rem;">📋 你嘅提醒清單</h3>
      <ul id="reminderList" class="reminder-list" aria-label="已設定的提醒">
        <li class="reminder-item" style="justify-content:center; color:#61767b;">暫無提醒，新增一個吧！</li>
      </ul>

      <div style="margin-top: 1rem; padding: .8rem 1rem; background: #f0f8f0; border-radius: 12px; font-size: .9rem; color: #2a5a3a;">
        💡 提你食藥嘅時候，小安會用語音叫你。
      </div>

      <button class="action-button secondary-button home-link" type="button" style="margin-top: 1.2rem;">返回主頁</button>
    </section>

    <section id="contactsPage" class="page subpage" hidden>
      <h1>聯繫人</h1>
      <p class="subpage-intro">新增或修改聯繫人。資料只會在本次開啟網頁期間保留。</p>
      <form id="contactForm">
        <div class="form-field">
          <label for="contactName">姓名</label>
          <input id="contactName" name="contactName" required>
        </div>
        <div class="form-field">
          <label for="contactDetail">電話或聯絡資料</label>
          <input id="contactDetail" name="contactDetail" inputmode="tel" required>
        </div>
        <button id="saveContactButton" class="action-button send-button" type="submit">新增聯繫人</button>
      </form>
      <p id="contactMessage" class="form-message" aria-live="polite"></p>
      <ul id="contactList" class="contact-list" aria-label="已加入的聯繫人"></ul>
      <button class="action-button secondary-button home-link" type="button">返回主頁</button>
    </section>

    <section id="caregiverPage" class="page subpage" hidden>
      <h1>照顧者模式</h1>
      <p class="subpage-intro">此頁面將於稍後提供。</p>
      <button class="action-button secondary-button home-link" type="button">返回主頁</button>
    </section>
  </main>

  <script>
    "use strict";

    // ===== CONFIGURATION =====
    const API_BASE_URL = "http://localhost:8001";   // 修改為你的伺服器地址
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // ===== DOM ELEMENTS =====
    const microphoneButton = document.getElementById("microphoneButton");
    const microphoneLabel = document.getElementById("microphoneLabel");
    const statusRegion = document.getElementById("status");
    const transcriptTextarea = document.getElementById("transcript");
    const sendButton = document.getElementById("sendButton");
    const retryButton = document.getElementById("retryButton");
    const clearButton = document.getElementById("clearButton");
    const menuButton = document.getElementById("menuButton");
    const menuPanel = document.getElementById("menuPanel");
    const menuOverlay = document.getElementById("menuOverlay");
    const pages = document.querySelectorAll(".page");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const accountMessage = document.getElementById("accountMessage");
    const contactForm = document.getElementById("contactForm");
    const contactList = document.getElementById("contactList");
    const contactMessage = document.getElementById("contactMessage");
    const saveContactButton = document.getElementById("saveContactButton");
    const conversationList = document.getElementById("conversationList");
    const conversationEmpty = document.getElementById("conversationEmpty");
    const autoPlayReply = document.getElementById("autoPlayReply");
    const playReplyButton = document.getElementById("playReplyButton");
    const stopAudioButton = document.getElementById("stopAudioButton");
    const replayReplyButton = document.getElementById("replayReplyButton");
    const audioStatus = document.getElementById("audioStatus");

    // Reminder elements
    const addReminderBtn = document.getElementById("addReminderBtn");
    const medNameInput = document.getElementById("medName");
    const medTimeInput = document.getElementById("medTime");
    const medRepeatSelect = document.getElementById("medRepeat");
    const reminderList = document.getElementById("reminderList");

    // ===== STATE =====
    let recognition = null;
    let recognitionActive = false;
    let finalTranscript = "";
    let ignoreAbortError = false;
    let temporaryAccount = null;
    let contacts = [];
    let editingContactIndex = -1;
    let latestAssistantReply = "";
    let latestAssistantLanguage = "zh-HK";
    let speechGeneration = 0;
    let lastInputMode = "text";
    const prototypeSessionId = createPrototypeSessionId();

    // Auth state
    let authToken = localStorage.getItem("reminder_token");

    // ===== HELPERS =====
    function createPrototypeSessionId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      if (window.crypto && typeof window.crypto.getRandomValues === "function") {
        const values = new Uint32Array(4);
        window.crypto.getRandomValues(values);
        return Array.from(values, function (v) { return v.toString(16); }).join("-");
      }
      return "prototype-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2);
    }

    function getPrototypeUserId() {
      return "web-demo-user";
    }

    function getSessionId() {
      return prototypeSessionId;
    }

    function getAuthHeaders() {
      return { "Authorization": "Bearer " + authToken };
    }

    function isAuthenticated() {
      return !!authToken;
    }

    function setAuthToken(token) {
      authToken = token;
      localStorage.setItem("reminder_token", token);
    }

    function clearAuth() {
      authToken = null;
      localStorage.removeItem("reminder_token");
    }

    // ===== AUDIO STATE =====
    function setAudioState(state, message) {
      const stateMessages = {
        idle: "",
        loading_response: "正在處理你的訊息……",
        response_ready: "回覆已完成。",
        speaking: "正在播放回覆……",
        stopped: "語音播放已停止。",
        speech_error: "語音播放失敗，你仍然可以閱讀文字回覆。",
        speech_unsupported: "這個瀏覽器暫時不支援語音播放，你仍然可以閱讀文字回覆。"
      };
      audioStatus.textContent = message || stateMessages[state];
      const hasReply = Boolean(latestAssistantReply);
      playReplyButton.disabled = !hasReply;
      replayReplyButton.disabled = !hasReply;
      stopAudioButton.disabled = state !== "speaking";
    }

    function appendConversationMessage(label, text, type) {
      conversationEmpty.hidden = true;
      const message = document.createElement("p");
      const messageLabel = document.createElement("span");
      const messageText = document.createTextNode(text);
      message.className = "message-bubble " + type;
      messageLabel.className = "message-label";
      messageLabel.textContent = label;
      message.append(messageLabel, messageText);
      conversationList.append(message);
    }

    function resolveSpeechLanguage(language) {
      const normalized = String(language || "").toLowerCase();
      if (normalized === "zh-tw") return "zh-TW";
      if (normalized === "zh-cn") return "zh-CN";
      if (normalized === "en" || normalized === "en-us") return "en-US";
      return "zh-HK";
    }

    function cancelAssistantSpeech(showStoppedState) {
      speechGeneration += 1;
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      if (showStoppedState && latestAssistantReply) setAudioState("stopped");
    }

    function stopAssistantSpeech() {
      cancelAssistantSpeech(true);
    }

    function speakAssistantReply(text, language) {
      if (!("speechSynthesis" in window) || typeof window.SpeechSynthesisUtterance !== "function") {
        setAudioState("speech_unsupported");
        return;
      }
      stopRecognition();
      cancelAssistantSpeech(false);
      const currentGeneration = speechGeneration;
      const resolvedLanguage = resolveSpeechLanguage(language);
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = resolvedLanguage;
      utterance.rate = 0.9;
      utterance.pitch = 1;
      utterance.volume = 1;
      const matchingVoice = window.speechSynthesis.getVoices().find(function (voice) {
        return voice.lang.toLowerCase() === resolvedLanguage.toLowerCase();
      });
      if (matchingVoice) utterance.voice = matchingVoice;

      utterance.onstart = function () {
        if (currentGeneration === speechGeneration) setAudioState("speaking");
      };
      utterance.onend = function () {
        if (currentGeneration === speechGeneration) setAudioState("response_ready", "語音播放完成。");
      };
      utterance.onerror = function () {
        if (currentGeneration === speechGeneration) setAudioState("speech_error");
      };
      window.speechSynthesis.speak(utterance);
    }

    // ===== UI HELPERS =====
    function setMenuOpen(isOpen) {
      menuPanel.hidden = !isOpen;
      menuOverlay.hidden = !isOpen;
      menuButton.setAttribute("aria-expanded", String(isOpen));
      menuButton.setAttribute("aria-label", isOpen ? "關閉選單" : "開啟選單");
      if (isOpen) menuPanel.querySelector(".menu-link").focus();
    }

    function showPage(pageId) {
      if (pageId !== "homePage") stopRecognition();
      pages.forEach(function (page) {
        page.hidden = page.id !== pageId;
      });
      setMenuOpen(false);
      window.scrollTo(0, 0);
      const heading = document.querySelector("#" + pageId + " h1");
      if (heading) {
        heading.setAttribute("tabindex", "-1");
        heading.focus();
      }
      if (pageId === "remindersPage") {
        loadReminders();
      }
    }

    function showAccountForm(mode) {
      const showLogin = mode === "login";
      loginForm.hidden = !showLogin;
      registerForm.hidden = showLogin;
      document.getElementById("showLoginButton").className = "action-button " + (showLogin ? "send-button" : "secondary-button");
      document.getElementById("showRegisterButton").className = "action-button " + (showLogin ? "secondary-button" : "send-button");
      accountMessage.textContent = "";
      (showLogin ? document.getElementById("loginName") : document.getElementById("registerName")).focus();
    }

    function renderContacts() {
      contactList.replaceChildren();
      contacts.forEach(function (contact, index) {
        const item = document.createElement("li");
        const details = document.createElement("span");
        const editButton = document.createElement("button");

        item.className = "contact-item";
        details.textContent = contact.name + "：" + contact.detail;
        editButton.className = "action-button secondary-button small-button";
        editButton.type = "button";
        editButton.textContent = "修改";
        editButton.addEventListener("click", function () {
          editingContactIndex = index;
          document.getElementById("contactName").value = contact.name;
          document.getElementById("contactDetail").value = contact.detail;
          saveContactButton.textContent = "儲存修改";
          contactMessage.textContent = "正在修改「" + contact.name + "」。";
          document.getElementById("contactName").focus();
        });

        item.append(details, editButton);
        contactList.append(item);
      });
    }

    // ===== REMINDER FUNCTIONS =====
    async function loadReminders() {
      if (!isAuthenticated()) {
        reminderList.innerHTML = '<li class="reminder-item" style="justify-content:center; color:#61767b;">請先登入以查看提醒。</li>';
        return;
      }

      try {
        const res = await fetch(API_BASE_URL + "/api/reminders", {
          headers: { "Authorization": "Bearer " + authToken }
        });
        if (!res.ok) {
          if (res.status === 401) {
            clearAuth();
            reminderList.innerHTML = '<li class="reminder-item" style="justify-content:center; color:#61767b;">登入已過期，請重新登入。</li>';
            return;
          }
          throw new Error("Failed to load reminders");
        }
        const reminders = await res.json();
        if (reminders.length === 0) {
          reminderList.innerHTML = '<li class="reminder-item" style="justify-content:center; color:#61767b;">暫無提醒，新增一個吧！</li>';
          return;
        }
        reminderList.innerHTML = reminders.map(function (reminder) {
          const daysDisplay = formatDays(reminder.days);
          return `<li class="reminder-item">
            <div>
              <strong>💊 ${reminder.text}</strong>
              <div style="font-size:0.9rem; color:#61767b;">🕐 ${reminder.time} · ${daysDisplay}</div>
            </div>
            <button class="action-button danger-button small-button" data-reminder-id="${reminder.id}">刪除</button>
          </li>`;
        }).join("");

        // 綁定刪除按鈕事件
        document.querySelectorAll("#reminderList .danger-button").forEach(function (btn) {
          btn.addEventListener("click", function () {
            const id = parseInt(btn.dataset.reminderId);
            deleteReminder(id);
          });
        });
      } catch (err) {
        console.error(err);
        reminderList.innerHTML = '<li class="reminder-item" style="justify-content:center; color:#b42318;">無法載入提醒，請稍後再試。</li>';
      }
    }

    function formatDays(days) {
      const map = {
        'mon,tue,wed,thu,fri,sat,sun': '每日',
        'mon,tue,wed,thu,fri': '平日 (一至五)',
        'sat,sun': '週末',
        'mon,wed,fri': '一三五',
        'tue,thu': '二四'
      };
      return map[days] || days;
    }

    async function addReminder() {
      if (!isAuthenticated()) {
        accountMessage.textContent = "請先登入以新增提醒。";
        showPage("accountPage");
        return;
      }

      const text = medNameInput.value.trim();
      const time = medTimeInput.value;
      const days = medRepeatSelect.value;

      if (!text) {
        alert("請輸入藥物名稱");
        medNameInput.focus();
        return;
      }
      if (!time) {
        alert("請選擇時間");
        medTimeInput.focus();
        return;
      }

      try {
        const res = await fetch(API_BASE_URL + "/api/reminders", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + authToken
          },
          body: JSON.stringify({
            patient_id: 1, // 暫時固定為 1，因為我們沒有患者選擇，可改進為動態
            text: text,
            time: time,
            days: days
          })
        });
        if (!res.ok) {
          const err = await res.json();
          alert("新增失敗：" + (err.detail || "未知錯誤"));
          return;
        }
        medNameInput.value = "";
        medTimeInput.value = "08:00";
        medRepeatSelect.selectedIndex = 0;
        loadReminders();
      } catch (err) {
        alert("連線錯誤：" + err.message);
      }
    }

    async function deleteReminder(reminderId) {
      if (!confirm("確定要刪除這個提醒嗎？")) return;
      try {
        const res = await fetch(API_BASE_URL + "/api/reminders/" + reminderId, {
          method: "DELETE",
          headers: { "Authorization": "Bearer " + authToken }
        });
        if (!res.ok) {
          alert("刪除失敗");
          return;
        }
        loadReminders();
      } catch (err) {
        alert("連線錯誤：" + err.message);
      }
    }

    // ===== RECOGNITION =====
    function setUiState(state, message) {
      const messages = {
        idle: "準備好後，請按下咪高峰。",
        listening: "正在聆聽，請慢慢說話……",
        processing: "正在整理文字……",
        transcript_ready: "已完成。請先確認下面的文字。",
        unsupported: "這個瀏覽器暫時不支援語音輸入。你仍然可以在下面輸入文字。",
        error: message || "發生錯誤，請再試一次。"
      };
      statusRegion.textContent = messages[state] || message;
      statusRegion.classList.toggle("error", state === "error");
      microphoneButton.classList.toggle("listening", state === "listening");
      microphoneButton.disabled = recognitionActive || !SpeechRecognition;
      microphoneButton.setAttribute("aria-label", state === "listening" ? "正在聆聽" : "按下說話");
      microphoneLabel.textContent = state === "listening" ? "正在聆聽" : "按下說話";
    }

    function startRecognition(clearExisting) {
      if (!recognition || recognitionActive) return;
      cancelAssistantSpeech(false);
      if (clearExisting) transcriptTextarea.value = "";
      finalTranscript = transcriptTextarea.value.trim();
      if (finalTranscript) finalTranscript += " ";
      ignoreAbortError = false;
      recognitionActive = true;
      setUiState("listening");
      try { recognition.start(); } catch (err) {
        recognitionActive = false;
        setUiState("error", "無法開始語音辨識，請再試一次。");
      }
    }

    function stopRecognition() {
      if (!recognition || !recognitionActive) return;
      ignoreAbortError = true;
      recognitionActive = false;
      try { recognition.abort(); } catch (err) { /* ignore */ }
    }

    // ===== INIT RECOGNITION =====
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "zh-HK";
      recognition.interimResults = true;
      recognition.continuous = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = function () {
        recognitionActive = true;
        setUiState("listening");
      };

      recognition.onresult = function (event) {
        let interimTranscript = "";
        lastInputMode = "voice";
        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          const text = event.results[index][0].transcript;
          if (event.results[index].isFinal) {
            finalTranscript += text;
          } else {
            interimTranscript += text;
          }
        }
        transcriptTextarea.value = finalTranscript + interimTranscript;
        if (finalTranscript.trim()) setUiState("transcript_ready");
      };

      recognition.onspeechend = function () {
        if (recognitionActive) setUiState("processing");
      };

      recognition.onerror = function (event) {
        recognitionActive = false;
        if (event.error === "aborted" && ignoreAbortError) return;
        const errorMessages = {
          "not-allowed": "請允許瀏覽器使用咪高峰。",
          "service-not-allowed": "請允許瀏覽器使用咪高峰。",
          "no-speech": "沒有聽到說話，請再試一次。",
          "audio-capture": "找不到可用的咪高峰。",
          "network": "語音辨識服務暫時無法連線，請稍後再試。",
          "aborted": "語音辨識已停止，請再試一次。"
        };
        setUiState("error", errorMessages[event.error] || "語音辨識未能完成，請再試一次。");
      };

      recognition.onend = function () {
        recognitionActive = false;
        ignoreAbortError = false;
        if (transcriptTextarea.value.trim()) {
          setUiState("transcript_ready");
        } else if (!statusRegion.classList.contains("error")) {
          setUiState("idle");
        } else {
          microphoneButton.disabled = false;
        }
      };
      setUiState("idle");
    } else {
      setUiState("unsupported");
    }

    // ===== EVENT LISTENERS =====
    microphoneButton.addEventListener("click", function () { startRecognition(false); });

    retryButton.addEventListener("click", function () {
      if (!SpeechRecognition) {
        setUiState("unsupported");
        transcriptTextarea.focus();
        return;
      }
      startRecognition(true);
    });

    clearButton.addEventListener("click", function () {
      stopRecognition();
      transcriptTextarea.value = "";
      finalTranscript = "";
      setUiState(SpeechRecognition ? "idle" : "unsupported");
      transcriptTextarea.focus();
    });

    transcriptTextarea.addEventListener("input", function () {
      lastInputMode = "text";
      if (!recognitionActive && transcriptTextarea.value.trim()) setUiState("transcript_ready");
    });

    sendButton.addEventListener("click", async function () {
      const confirmedTranscript = transcriptTextarea.value.trim();
      if (!confirmedTranscript) {
        setUiState("error", "請先說話或輸入文字。");
        transcriptTextarea.focus();
        return;
      }
      sendButton.disabled = true;
      setUiState("processing", "正在處理你的訊息……");
      setAudioState("loading_response");

      try {
        const response = await fetch(API_BASE_URL + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: confirmedTranscript,
            user_id: getPrototypeUserId(),
            session_id: getSessionId(),
            input_mode: lastInputMode
          })
        });
        const payload = await response.json().catch(function () { return {}; });
        if (!response.ok) throw new Error("agent-response");
        const reply = typeof payload.reply === "string" ? payload.reply.trim() : "";
        if (!reply) throw new Error("agent-response");

        appendConversationMessage("你", confirmedTranscript, "user");
        appendConversationMessage("CoA 助理", reply, "assistant");
        latestAssistantReply = reply;
        latestAssistantLanguage = payload.language || "zh-HK";
        setUiState("transcript_ready", "回覆已完成。");
        setAudioState("response_ready");
        if (autoPlayReply.checked) speakAssistantReply(latestAssistantReply, latestAssistantLanguage);
      } catch (err) {
        if (err instanceof TypeError) {
          setUiState("error", "暫時無法連接 CoA-Agent，請稍後再試。");
        } else {
          setUiState("error", "CoA-Agent 暫時無法處理這個訊息，請稍後再試。");
        }
        setAudioState("idle");
      } finally {
        sendButton.disabled = false;
      }
    });

    playReplyButton.addEventListener("click", function () { speakAssistantReply(latestAssistantReply, latestAssistantLanguage); });
    replayReplyButton.addEventListener("click", function () { speakAssistantReply(latestAssistantReply, latestAssistantLanguage); });
    stopAudioButton.addEventListener("click", stopAssistantSpeech);

    // ===== AUTH =====
    document.getElementById("showLoginButton").addEventListener("click", function () { showAccountForm("login"); });
    document.getElementById("showRegisterButton").addEventListener("click", function () { showAccountForm("register"); });

    registerForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      const username = document.getElementById("registerName").value.trim();
      const password = document.getElementById("registerPassword").value;
      const display_name = document.getElementById("registerDisplayName").value.trim();

      if (!username || !password || !display_name) {
        accountMessage.textContent = "請填寫所有欄位。";
        return;
      }

      try {
        const res = await fetch(API_BASE_URL + "/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, display_name })
        });
        const data = await res.json();
        if (!res.ok) {
          accountMessage.textContent = "註冊失敗：" + (data.detail || "未知錯誤");
          return;
        }
        setAuthToken(data.access_token);
        accountMessage.textContent = "註冊成功！已自動登入。";
        showPage("homePage");
        loadReminders();
      } catch (err) {
        accountMessage.textContent = "連線錯誤：" + err.message;
      }
    });

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      const username = document.getElementById("loginName").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!username || !password) {
        accountMessage.textContent = "請輸入用戶名稱和密碼。";
        return;
      }

      try {
        const res = await fetch(API_BASE_URL + "/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          accountMessage.textContent = "登入失敗：" + (data.detail || "用戶名稱或密碼不正確");
          return;
        }
        setAuthToken(data.access_token);
        accountMessage.textContent = "登入成功！歡迎你，" + data.display_name + "。";
        loginForm.reset();
        showPage("homePage");
        loadReminders();
      } catch (err) {
        accountMessage.textContent = "連線錯誤：" + err.message;
      }
    });

    // ===== CONTACTS =====
    contactForm.addEventListener("submit", function (event) {
      event.preventDefault();
      const contact = {
        name: document.getElementById("contactName").value.trim(),
        detail: document.getElementById("contactDetail").value.trim()
      };
      if (editingContactIndex >= 0) {
        contacts[editingContactIndex] = contact;
        contactMessage.textContent = "聯繫人已修改。";
      } else {
        contacts.push(contact);
        contactMessage.textContent = "聯繫人已新增。";
      }
      editingContactIndex = -1;
      saveContactButton.textContent = "新增聯繫人";
      contactForm.reset();
      renderContacts();
    });

    // ===== MENU & NAVIGATION =====
    menuButton.addEventListener("click", function () { setMenuOpen(menuPanel.hidden); });
    menuOverlay.addEventListener("click", function () { setMenuOpen(false); menuButton.focus(); });
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && !menuPanel.hidden) {
        setMenuOpen(false);
        menuButton.focus();
      }
    });
    document.querySelectorAll(".page-link").forEach(function (button) {
      button.addEventListener("click", function () { showPage(button.dataset.page); });
    });
    document.querySelectorAll(".home-link").forEach(function (button) {
      button.addEventListener("click", function () { showPage("homePage"); });
    });

    // ===== REMINDER ADD BUTTON =====
    addReminderBtn.addEventListener("click", addReminder);

    // ===== AUTO-LOAD ON START =====
    // 如果已有 token，嘗試加載提醒（但提醒頁面只在切換到時載入）
    // 我們會在 showPage('remindersPage') 時調用 loadReminders

    // ===== INIT =====
    setUiState(SpeechRecognition ? "idle" : "unsupported");
    // 預設顯示主頁
    showPage("homePage");

    // 如果已有 token 且沒有過期，可嘗試預載（但加載提醒只在切換頁面時觸發）
    if (isAuthenticated()) {
      // 驗證 token 是否有效（可選）
      // 簡單起見，不驗證
    }
  </script>
</body>
