# Example HTTP listener. Add the site's existing TLS certificate directives for
# production HTTPS. Only Nginx is browser-facing; both APIs bind to loopback.
server {
    listen 8080;
    server_name _;

    root /opt/coa/CoA-Agent/web;
    index index.html;

    location = /api/chat {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    location ~ ^/api/(auth|reminders|patients|patient|emergency)(/|$) {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
